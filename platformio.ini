[platformio]
default_envs = heltec-usb
build_cache_dir = .cache

[env]
platform      = espressif32 @ 6.6.0
board         = heltec_wifi_lora_32_V2
framework     = arduino
monitor_speed = 115200
build_flags   = -D RF_SX1276
                -D setRxBW
                -D RF_MODULE_CS=18
                -D RF_MODULE_MOSI=27
                -D RF_MODULE_MISO=19
                -D RF_MODULE_SCK=5
                -D RF_MODULE_RST=14
                -D RF_MODULE_DIO0=26
                -D RF_MODULE_DIO1=35
                -D RF_MODULE_DIO2=34
                -D RTL_DEBUG=0
                -D MINIMUM_PULSE_LENGTH=10
                -D MINIMUM_SIGNAL_LENGTH=2500
                ; Full rtl_433 decoder set (no -D MY_DEVICES) so every supported protocol decodes.

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    mathieucarbou/AsyncTCP @ ^3.3.2
    https://github.com/Entropy512/rtl_433_ESP.git#neptune_r900
    knolleary/PubSubClient @ ^2.8
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays @ ^4.6.1

[env:heltec-usb]
upload_protocol = esptool
; upload_port = COM3          ; set to your board's serial port, or let PlatformIO auto-detect

[env:heltec-wifi]
upload_protocol = espota
upload_port     = 192.168.1.50     ; <-- set to YOUR board's IP address for OTA updates
; If OTA can't auto-detect your PC's IP (common on PCs with several network adapters), add:
;   upload_flags = --host_ip=YOUR_PC_LAN_IP
